<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>German Word Maker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fafaf8; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .wrap { max-width: 600px; width: 100%; }
    h1 { font-size: 28px; font-weight: 500; margin-bottom: 6px; }
    .sub { font-size: 15px; color: #666; margin-bottom: 1.5rem; }
    textarea { width: 100%; min-height: 90px; font-size: 15px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; resize: vertical; font-family: inherit; line-height: 1.5; }
    textarea:focus { outline: none; border-color: #999; }
    button { margin-top: 10px; padding: 10px 22px; border: 1px solid #ccc; border-radius: 8px; background: #fff; font-size: 14px; cursor: pointer; font-family: inherit; }
    button:hover { background: #f0f0ee; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .card { margin-top: 2rem; background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.5rem; }
    .word-row { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
    .word { font-size: 34px; font-weight: 500; }
    .speak-btn { padding: 6px 14px; font-size: 13px; border: 1px solid #ddd; border-radius: 20px; background: #fff; cursor: pointer; color: #555; margin-top: 0; }
    .speak-btn:hover { background: #f0f0ee; }
    .speak-btn.speaking { background: #f0f0ee; color: #999; }
    .pronun { font-size: 14px; color: #888; margin-bottom: 1.25rem; font-style: italic; }
    .label { font-size: 11px; font-weight: 500; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .parts { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.25rem; }
    .part { background: #f5f5f3; border: 1px solid #e5e5e5; border-radius: 6px; padding: 4px 10px; font-size: 13px; color: #555; }
    .part strong { color: #1a1a1a; font-weight: 500; }
    .definition { font-size: 15px; line-height: 1.6; margin-bottom: 1.25rem; }
    .example { font-size: 14px; color: #666; line-height: 1.6; border-left: 2px solid #ddd; padding-left: 12px; margin-bottom: 1.5rem; }
    .share-row { display: flex; align-items: center; gap: 10px; padding-top: 1.25rem; border-top: 1px solid #f0f0ee; flex-wrap: wrap; }
    .share-label { font-size: 13px; color: #999; margin-top: 0; }
    .share-btn { margin-top: 0; padding: 7px 16px; font-size: 13px; border-radius: 20px; border: 1px solid #ddd; background: #fff; cursor: pointer; color: #444; display: flex; align-items: center; gap: 6px; }
    .share-btn:hover { background: #f0f0ee; }
    .powered { margin-top: 2.5rem; text-align: center; font-size: 13px; color: #bbb; }
    .powered a { color: #999; text-decoration: none; }
    .powered a:hover { color: #555; }
    .fw-cta { margin-top: 1rem; text-align: center; font-size: 13px; color: #888; }
    .fw-cta a { color: #555; font-weight: 500; text-decoration: underline; }
    .status { margin-top: 10px; font-size: 13px; color: #999; }
    .error { margin-top: 1rem; font-size: 14px; color: #c0392b; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>German Word Maker</h1>
    <p class="sub">Describe a concept, feeling, or situation. Get a brand new German word for it.</p>
    <textarea id="concept" placeholder="e.g. the satisfying feeling of peeling protective film off a new screen"></textarea>
    <br>
    <button id="btn" onclick="generate()">Make a word</button>
    <div class="status" id="status"></div>
    <div class="error" id="error"></div>
    <div id="result"></div>
    <div class="fw-cta" id="fw-cta" style="display:none;">
      Want words like this on your screens automatically? <a href="https://frameweave.com" target="_blank">That's Frame Weave.</a>
    </div>
    <div class="powered">
      Powered by <a href="https://frameweave.com" target="_blank">Frame Weave</a>
    </div>
  </div>

  <script>
    let currentWord = null;
    let currentExample = null;
    let currentDefinition = null;

    function speak() {
      if (!currentWord || !currentExample) return;
      window.speechSynthesis.cancel();

      const btn = document.getElementById('speak-btn');
      btn.textContent = 'Speaking...';
      btn.classList.add('speaking');
      btn.disabled = true;

      const exampleGerman = currentExample.split('(')[0].trim();
      const text = currentWord + '. ' + exampleGerman;

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'de-DE';
      utterance.rate = 0.9;

      const voices = window.speechSynthesis.getVoices();
      const germanVoice = voices.find(v => v.lang.startsWith('de'));
      if (germanVoice) utterance.voice = germanVoice;

      utterance.onend = () => {
        btn.textContent = 'Hear it';
        btn.classList.remove('speaking');
        btn.disabled = false;
      };

      window.speechSynthesis.speak(utterance);
    }

    function shareTwitter() {
      const text = `${currentWord}: ${currentDefinition}\n\nMake your own at germanwordmaker.com`;
      const url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text);
      window.open(url, '_blank');
    }

    function shareLinkedIn() {
      const url = 'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent('https://germanwordmaker.com');
      window.open(url, '_blank');
    }

    async function generate() {
      const concept = document.getElementById('concept').value.trim();
      if (!concept) return;

      window.speechSynthesis.cancel();

      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      const resultEl = document.getElementById('result');
      const errorEl = document.getElementById('error');
      const fwCta = document.getElementById('fw-cta');

      btn.disabled = true;
      resultEl.innerHTML = '';
      errorEl.textContent = '';
      fwCta.style.display = 'none';
      status.textContent = 'Inventing...';

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ concept })
        });

        const word = await res.json();
        if (word.error) throw new Error(word.error);

        currentWord = word.word;
        currentExample = word.example;
        currentDefinition = word.definition;

        resultEl.innerHTML = `
          <div class="card">
            <div class="word-row">
              <div class="word">${word.word}</div>
              <button class="speak-btn" id="speak-btn" onclick="speak()">Hear it</button>
            </div>
            <div class="pronun">[${word.pronunciation}]</div>
            <div class="label">Built from</div>
            <div class="parts">
              ${word.parts.map(p => `<div class="part"><strong>${p.german}</strong> — ${p.meaning}</div>`).join('')}
            </div>
            <div class="label">Definition</div>
            <div class="definition">${word.definition}</div>
            <div class="label">Example</div>
            <div class="example">${word.example}</div>
            <div class="share-row">
              <span class="share-label">Share this word:</span>
              <button class="share-btn" onclick="shareTwitter()">X / Twitter</button>
              <button class="share-btn" onclick="shareLinkedIn()">LinkedIn</button>
            </div>
          </div>
        `;

        fwCta.style.display = 'block';

      } catch (e) {
        errorEl.textContent = 'Something went wrong. Try again.';
      }

      btn.disabled = false;
      status.textContent = '';
    }

    document.getElementById('concept').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) generate();
    });
  </script>
</body>
</html>
